<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PashuRaksha — Smart Livestock Care</title>
  
  <meta name="description" content="PashuRaksha - Smart Digital Farm Management Portal for Monitoring MRL and AMU in Livestock.">
  
  <!-- Toastify CSS -->
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#059669', // Emerald 600
              dark: '#047857',
              light: '#10b981'
            },
            secondary: '#d97706', // Amber 600
            surface: '#ffffff',
            background: '#f8fafc'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            brand: ['Outfit', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Toastify JS -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 glass-panel m-4 flex flex-col justify-between hidden md:flex z-20">
    <div>
      <div class="p-6 border-b border-gray-100 flex justify-center items-center">
        <img src="assets/logo.jpg" alt="PashuRaksha Logo" class="h-16 w-auto object-contain hover:scale-105 transition-transform cursor-pointer" onclick="window.location.reload()">
      </div>
      
      <nav class="p-4 space-y-1.5 mt-2">
        <a href="#" class="nav-item active flex items-center space-x-3 p-3 rounded-lg font-medium text-gray-600" data-view="dashboard">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item flex items-center space-x-3 p-3 rounded-lg font-medium text-gray-600" data-view="animals">
          <i data-lucide="paw-print" class="w-5 h-5"></i>
          <span>Animal Registry</span>
        </a>
        <a href="#" class="nav-item flex items-center space-x-3 p-3 rounded-lg font-medium text-gray-600" data-view="treatments">
          <i data-lucide="syringe" class="w-5 h-5"></i>
          <span>Treatment Logs</span>
        </a>
        <a href="#" class="nav-item flex items-center space-x-3 p-3 rounded-lg font-medium text-gray-600" data-view="mrl">
          <i data-lucide="alert-triangle" class="w-5 h-5"></i>
          <span>MRL Tracker</span>
        </a>
        <a href="#" class="nav-item flex items-center space-x-3 p-3 rounded-lg font-medium text-gray-600" data-view="reports">
          <i data-lucide="file-bar-chart-2" class="w-5 h-5"></i>
          <span>Reports</span>
        </a>
      </nav>
    </div>

    <div class="p-4 border-t border-gray-100">
      <div class="nav-item flex items-center space-x-3 p-3 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors" data-view="profile">
        <img src="https://ui-avatars.com/api/?name=Farm+Manager&background=059669&color=fff" alt="User" class="w-10 h-10 rounded-full shadow-sm">
        <div>
          <p class="text-sm font-bold text-gray-800" id="sidebar-user-name">Tushar K.</p>
          <p class="text-xs text-gray-500" id="sidebar-farm-name">Green Valley Farm</p>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 ml-auto"></i>
      </div>
    </div>
  </aside>

  <!-- Mobile Header -->
  <div class="md:hidden fixed top-0 left-0 right-0 glass-panel m-2 p-4 flex justify-between items-center z-30">
    <div class="flex items-center space-x-2">
      <div class="bg-primary text-white p-1.5 rounded-lg shadow-sm">
        <i data-lucide="shield-check" class="w-5 h-5"></i>
      </div>
      <h1 class="text-xl font-bold text-gray-800 brand-font">PashuRaksha</h1>
    </div>
    <button id="mobile-menu-btn" class="text-gray-600 p-1 hover:bg-gray-100 rounded-lg">
      <i data-lucide="menu"></i>
    </button>
  </div>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto p-4 md:p-8 pt-24 md:pt-8 w-full">
    
    <!-- Header Area -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 slide-up">
      <div>
        <h2 id="page-title" class="text-3xl font-bold text-gray-800 brand-font tracking-tight">Dashboard</h2>
        <p id="page-subtitle" class="text-gray-500 mt-1 text-sm">Overview of AMU and MRL Compliance.</p>
      </div>
      <div class="flex items-center space-x-3 w-full md:w-auto">
        <button class="p-2.5 bg-white rounded-full shadow-sm hover:shadow hover:-translate-y-0.5 transition-all relative border border-gray-100">
          <i data-lucide="bell" class="text-gray-600 w-5 h-5"></i>
          <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
        <button class="flex-1 md:flex-none bg-primary hover:bg-primary-dark text-white px-5 py-2.5 rounded-xl font-semibold shadow-md hover:shadow-lg transition-all flex items-center justify-center space-x-2 hover:-translate-y-0.5" onclick="openAddTreatmentModal()">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span>Log Treatment</span>
        </button>
      </div>
    </header>

    <!-- Dynamic Views Container -->
    <div id="view-container" class="pb-20">
      <!-- Views injected by app.js -->
    </div>

  </main>

  <!-- Modals will be dynamically injected here -->
  <div id="modal-container"></div>

  <!-- Scripts -->
  <script src="js/config.js?v=2"></script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/utils/toast.js?v=2"></script>
  <script src="js/lib/auth.js?v=2"></script>
  <script src="js/services/userService.js?v=2"></script>
  <script src="js/services/animalService.js?v=2"></script>
  <script src="js/services/treatmentService.js?v=2"></script>
  <script src="js/services/dashboardService.js?v=2"></script>
  <script src="js/data.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
